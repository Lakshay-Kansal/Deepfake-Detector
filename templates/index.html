<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        /* ==================== UPLOAD AREA ==================== */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            border-style: solid;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        /* ==================== PREVIEW ==================== */
        .preview-area {
            margin-top: 25px;
            display: none;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 600;
            transition: all 0.3s;
            display: block;
            margin: 20px auto 0;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ==================== LOADING ==================== */
        .loading {
            display: none;
            text-align: center;
            margin-top: 25px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==================== RESULTS ==================== */
        .result-area {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-area.real {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border: 3px solid #28a745;
        }

        .result-area.fake {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border: 3px solid #dc3545;
        }

        .result-label {
            font-size: 2.2em;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
        }

        .result-label.real {
            color: #28a745;
        }

        .result-label.fake {
            color: #dc3545;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 25px;
            overflow: hidden;
            height: 35px;
            margin-bottom: 12px;
        }

        .confidence-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            transition: width 0.8s ease-out;
        }

        .confidence-fill.real {
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
        }

        .confidence-fill.fake {
            background: linear-gradient(90deg, #dc3545 0%, #e74c3c 100%);
        }

        .confidence-text {
            text-align: center;
            color: #555;
            font-size: 0.95em;
            font-weight: 500;
        }

        /* ==================== ERROR ==================== */
        .error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            padding: 18px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border: 2px solid #dc3545;
        }

        @media (max-width: 600px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Deepfake Detector</h1>
        <p class="subtitle">Detect deepfakes in images using AI</p>

        <!-- Image Upload -->
        <div class="upload-area" id="imageUploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-subtext">PNG, JPG, JPEG (Max 16MB)</div>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="preview-area" id="imagePreviewArea">
            <img id="imagePreview" class="preview-image" alt="Preview">
            <button type="button" class="btn" id="analyzeImageBtn">🔬 Analyze Image</button>
        </div>

        <div class="loading" id="imageLoading">
            <div class="spinner"></div>
            <p>🤖 Analyzing image...</p>
        </div>

        <div class="result-area" id="imageResult"></div>
        <div class="error" id="imageError"></div>
    </div>

    <script>
        let selectedImageFile = null;

        // ==================== IMAGE HANDLING ====================
        const imageUploadArea = document.getElementById('imageUploadArea');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewArea = document.getElementById('imagePreviewArea');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeImageBtn = document.getElementById('analyzeImageBtn');
        const imageLoading = document.getElementById('imageLoading');
        const imageResult = document.getElementById('imageResult');
        const imageError = document.getElementById('imageError');

        imageUploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => handleImageFile(e.target.files[0]));

        imageUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUploadArea.classList.add('dragover');
        });
        imageUploadArea.addEventListener('dragleave', () => {
            imageUploadArea.classList.remove('dragover');
        });
        imageUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUploadArea.classList.remove('dragover');
            handleImageFile(e.dataTransfer.files[0]);
        });

        analyzeImageBtn.addEventListener('click', () => analyzeMedia('image'));

        function handleImageFile(file) {
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showError('image', 'Please upload an image file');
                return;
            }
            selectedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imageUploadArea.style.display = 'none';
                imagePreviewArea.style.display = 'block';
                imageResult.style.display = 'none';
                imageError.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // ==================== ANALYZE IMAGE ====================
        async function analyzeMedia(type) {
            if (!selectedImageFile) return;

            const formData = new FormData();
            formData.append('file', selectedImageFile);

            try {
                analyzeImageBtn.disabled = true;
                imageLoading.style.display = 'block';
                imageResult.style.display = 'none';
                imageError.style.display = 'none';

                const response = await fetch(`http://localhost:5000/predict/image`, {
                    method: 'POST',
                    body: formData
                });

                const contentType = response.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    throw new Error('Server not reachable. Make sure app.py is running on port 5000.');
                }

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Analysis failed');
                }

                setTimeout(() => displayResults(data), 500);

            } catch (error) {
                showError('image', error.message);
            } finally {
                analyzeImageBtn.disabled = false;
                imageLoading.style.display = 'none';
            }
        }

        function displayResults(data) {
            const isFake = data.prediction === 'FAKE';
            const percentage = isFake ? data.fake_probability : data.real_probability;
            const fillClass = isFake ? 'fake' : 'real';
            const emoji = isFake ? '⚠️' : '✅';

            imageResult.innerHTML = `
                <div class="result-label ${fillClass}">${emoji} ${data.prediction}</div>
                <div class="confidence-bar">
                    <div class="confidence-fill ${fillClass}" style="width: 0%" id="imageFill">
                        <span class="conf-text"></span>
                    </div>
                </div>
                <p class="confidence-text">Real: ${data.real_probability}% &nbsp;|&nbsp; Fake: ${data.fake_probability}%</p>
                <button type="button" class="btn" onclick="resetUpload()">🔄 Analyze Another Image</button>
            `;

            imageResult.className = 'result-area ' + fillClass;
            imageResult.style.display = 'block';

            setTimeout(() => {
                const fill = document.getElementById('imageFill');
                if (fill) {
                    fill.style.width = percentage + '%';
                    fill.querySelector('.conf-text').textContent = Math.round(percentage) + '%';
                }
            }, 100);
        }

        function showError(type, message) {
            imageError.textContent = '⚠️ ' + message;
            imageError.style.display = 'block';
        }

        function resetUpload() {
            selectedImageFile = null;
            imageInput.value = '';
            imageUploadArea.style.display = 'block';
            imagePreviewArea.style.display = 'none';
            imageResult.style.display = 'none';
            imageError.style.display = 'none';
        }

        console.log('🚀 Deepfake Detector loaded!');
    </script>
</body>
</html>
